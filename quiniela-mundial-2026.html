<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Quiniela Mundial 2026 | hectorhardy.com</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;600&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg: #080c18;
            --surf: #101728;
            --surf2: #182038;
            --gold: #f0b832;
            --text: #f2f2f2;
            --muted: #6878a0;
            --nav-w: 240px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        nav {
            width: var(--nav-w);
            background: var(--surf);
            padding: 2rem;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            position: fixed;
            height: 100vh;
        }

        nav h2 {
            font-family: 'Barlow Condensed';
            color: var(--gold);
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        .nav-link {
            display: block;
            color: var(--text);
            text-decoration: none;
            margin-bottom: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: var(--gold);
        }

        /* Main Content */
        main {
            margin-left: var(--nav-w);
            padding: 3rem;
            width: 100%;
            max-width: 900px;
        }

        .view {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Match Cards */
        .match-card {
            background: var(--surf2);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .group-label {
            font-size: 0.75rem;
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 10px;
            display: block;
        }

        .teams-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 1.5rem;
        }

        .team-name {
            font-family: 'Barlow Condensed';
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        input[type="number"] {
            width: 55px;
            height: 50px;
            background: #000;
            border: 1px solid var(--muted);
            color: #fff;
            text-align: center;
            font-size: 1.5rem;
            border-radius: 6px;
            font-weight: 700;
        }

        input:focus {
            border-color: var(--gold);
            outline: none;
        }

        .btn-analysis {
            display: inline-block;
            margin-top: 1rem;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.85rem;
            border-bottom: 1px solid transparent;
        }

        .btn-analysis:hover {
            border-bottom: 1px solid var(--gold);
        }

        /* Auth */
        .auth-container {
            max-width: 400px;
            margin: 10vh auto;
            text-align: center;
        }

        .auth-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: var(--surf2);
            border: 1px solid var(--muted);
            color: white;
            border-radius: 4px;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            border: none;
            font-weight: 800;
            cursor: pointer;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            nav {
                width: 100%;
                height: auto;
                position: relative;
                padding: 1rem;
                border-right: none;
                border-bottom: 1px solid var(--muted);
            }

            main {
                margin-left: 0;
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <nav id="sidebar" style="display: none;">
        <h2>HECTOR HARDY</h2>
        <a class="nav-link" onclick="showView('quiniela')">MI QUINIELA</a>
        <a class="nav-link" onclick="showView('ranking')">CLASIFICACIÓN</a>
        <a class="nav-link" onclick="showView('reglas')">REGLAS Y FIFA</a>
        <div style="margin-top: 3rem;">
            <a href="index.html" class="nav-link" style="color: var(--muted); font-size: 0.9rem;">← VOLVER AL BLOG</a>
            <a class="nav-link" onclick="logout()" style="color: #ff4444; font-size: 0.9rem;">CERRAR SESIÓN</a>
        </div>
    </nav>

    <main>
        <section id="auth-view" class="auth-container">
            <h1 style="font-family: 'Barlow Condensed'; font-size: 2.5rem; margin-bottom: 1.5rem;">MUNDIAL 2026</h1>
            <input type="text" id="auth-user" class="auth-input" placeholder="Nombre de usuario">
            <input type="email" id="auth-email" class="auth-input" placeholder="Tu Email">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Contraseña">
            <button class="btn-primary" onclick="handleAuth()">ENTRAR A JUGAR</button>
        </section>

        <section id="quiniela-view" class="view">
            <h1 style="font-family: 'Barlow Condensed'; font-size: 2.5rem;">TUS PRONÓSTICOS</h1>
            <p style="color: var(--muted); margin-bottom: 2rem;">Haz click en los números para apostar. Se guarda
                automáticamente.</p>
            <div id="matches-container"></div>
            <button class="btn-primary" style="margin-top: 2rem; background: #e1306c; color: #fff;"
                onclick="takeScreenshot()">DESCARGAR STORY PARA INSTAGRAM</button>
        </section>

        <section id="ranking-view" class="view">
            <h1 style="font-family: 'Barlow Condensed'; font-size: 2.5rem;">TABLA DE POSICIONES</h1>
            <table style="width: 100%; border-collapse: collapse; margin-top: 2rem;">
                <tr style="border-bottom: 2px solid var(--gold); color: var(--gold);">
                    <th style="text-align: left; padding: 10px;">JUGADOR</th>
                    <th style="text-align: right; padding: 10px;">PUNTOS TOTALES</th>
                </tr>
                <tbody id="ranking-body"></tbody>
            </table>
        </section>
    </main>

    <script>
        // Estas líneas buscarán las variables que configuraste en Vercel
        const SB_URL = process.env.NEXT_PUBLIC_SB_URL || 'TU_URL_DE_PROBADO_LOCAL';
        const SB_KEY = process.env.NEXT_PUBLIC_SB_KEY || 'TU_KEY_DE_PROBADO_LOCAL';

        const supabase = exports.supabase.createClient(SB_URL, SB_KEY);

        let user = null;

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const username = document.getElementById('auth-user').value;

            const { data, error } = await supabase.auth.signUp({ email, password: pass, options: { data: { username } } });

            if (error) { // Login si ya existe
                const { data: logData, error: logErr } = await supabase.auth.signInWithPassword({ email, password: pass });
                if (logErr) return alert("Error al entrar");
                initSession(logData.user);
            } else {
                await supabase.from('profiles').insert({ id: data.user.id, username, email });
                initSession(data.user);
            }
        }

        function initSession(sessionData) {
            user = sessionData;
            document.getElementById('auth-view').style.display = 'none';
            document.getElementById('sidebar').style.display = 'block';
            showView('quiniela');
            loadContent();
        }

        async function loadContent() {
            const { data: matches } = await supabase.from('matches').select('*').order('id', { ascending: true });
            const { data: preds } = await supabase.from('predictions').select('*').eq('user_id', user.id);

            let html = '';
            matches.forEach(m => {
                const userP = preds.find(p => p.match_id === m.id) || { pred_s1: '', pred_s2: '' };
                html += `
        <div class="match-card">
          <span class="group-label">${m.group_name}</span>
          <div class="teams-row">
            <div class="team-name" style="text-align: right;">${m.team1}</div>
            <div style="display: flex; gap: 8px;">
              <input type="number" value="${userP.pred_s1}" onchange="savePred('${m.id}', this.value, 1)">
              <input type="number" value="${userP.pred_s2}" onchange="savePred('${m.id}', this.value, 2)">
            </div>
            <div class="team-name">${m.team2}</div>
          </div>
          ${m.analysis_url ? `<a href="${m.analysis_url}" class="btn-analysis">Ver análisis táctico →</a>` : ''}
        </div>`;
            });
            document.getElementById('matches-container').innerHTML = html;
        }

        async function savePred(mid, val, slot) {
            const field = slot === 1 ? 'pred_s1' : 'pred_s2';
            await supabase.from('predictions').upsert({
                user_id: user.id, match_id: mid, [field]: parseInt(val)
            }, { onConflict: 'user_id, match_id' });
        }

        function takeScreenshot() {
            html2canvas(document.querySelector("#quiniela-view"), { backgroundColor: '#080c18', scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'mi-quiniela-mundial.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function showView(v) {
            document.querySelectorAll('.view').forEach(el => el.style.display = 'none');
            document.getElementById(v + '-view').style.display = 'block';
            if (v === 'ranking') loadRanking();
        }

        async function loadRanking() {
            const { data } = await supabase.from('profiles').select('username, points').order('points', { ascending: false });
            document.getElementById('ranking-body').innerHTML = data.map(r => `
      <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
        <td style="padding: 15px;">${r.username}</td>
        <td style="padding: 15px; text-align: right; font-weight: 800;">${r.points} PTS</td>
      </tr>`).join('');
        }

        function logout() { supabase.auth.signOut(); location.reload(); }
    </script>
</body>

</html>
